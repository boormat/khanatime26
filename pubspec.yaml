name: khanatime26
description: Khanacross timing — grassroots motorsport
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Routing
  go_router: ^15.1.3

  # BLE (Phase 5)
  # flutter_blue_plus: ^1.31.0

  # QR scanning (Phase 4)
  # mobile_scanner: ^7.3.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^19.2.1

  # Crypto
  crypto: ^3.0.6

  # UI
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Drift code generation
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

  # Riverpod code generation
  riverpod_generator: ^2.6.3

  # Custom lint rules for Riverpod
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
