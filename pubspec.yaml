name: khanatime26
description: Khanacross timing — grassroots motorsport
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Routing
  go_router: ^17.3.0

  # BLE (Phase 5)
  # flutter_blue_plus: ^1.31.0

  # QR scanning (Phase 4)
  # mobile_scanner: ^7.3.0

  # Secure storage
  flutter_secure_storage: ^10.3.1

  # Notifications
  flutter_local_notifications: ^22.1.0

  # Crypto
  crypto: ^3.0.6

  # UI
  intl: ^0.20.3
  drift_flutter: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

  # Riverpod code generation
  riverpod_generator: ^4.0.4

  # Custom lint rules for Riverpod
  riverpod_lint: ^3.1.4

flutter:
  uses-material-design: true
